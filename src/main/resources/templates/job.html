```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Job Hunter Email</title>
</head>

<body style="margin:0; padding:0; background-color:#f5f5f5; font-family: Arial, Helvetica, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0"
       style="background-color:#f5f5f5; padding:30px 0;">

    <tr>
        <td align="center">

            <!-- MAIN CONTAINER -->
            <table width="600" cellpadding="0" cellspacing="0" border="0"
                   style="background-color:#ffffff; border-radius:8px; padding:30px;">

                <!-- HEADER -->
                <tr>
                    <td>
                        <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td align="left"
                                    style="font-size:22px; font-weight:bold; color:#ea1e30;">
                                    Cơ hội trước mắt
                                </td>

                                <td align="right"
                                    style="font-size:16px; color:#666666;">
                                    Chất lượng, uy tín
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- LINE -->
                <tr>
                    <td style="padding:20px 0;">
                        <div style="border-top:1px solid #eeeeee;"></div>
                    </td>
                </tr>

                <!-- GREETING -->
                <tr>
                    <td style="font-size:16px; color:#333333; line-height:24px;">
                        Hi <span th:text="${name}"></span>,
                        <br><br>
                        One of these jobs may be your next one. Find out today!
                    </td>
                </tr>

                <!-- SPACE -->
                <tr>
                    <td style="padding-top:25px;"></td>
                </tr>

                <!-- JOB LIST -->
                <tr>
                    <td>

                        <table width="100%" cellpadding="0" cellspacing="0">

                            <tr th:each="job : ${jobs}">
                                <td style="padding-bottom:25px;">

                                    <!-- JOB NAME -->
                                    <div style="margin-bottom:6px;">
                                        <a th:href="@{https://jobhunter-fe-one.vercel.app/job/open-to-email(id=${job.id})}"
                                           target="_blank"
                                           th:text="${job.name}"
                                           style="font-size:18px;
                                                  font-weight:bold;
                                                  color:#1677ff;
                                                  text-decoration:none;">
                                        </a>
                                    </div>

                                    <!-- COMPANY -->
                                    <div th:text="${job.company.name}"
                                         style="font-size:14px;
                                                color:#666666;
                                                margin-bottom:6px;">
                                    </div>

                                    <!-- SALARY -->
                                    <div style="font-size:14px;
                                                color:#ea1e30;
                                                font-weight:bold;
                                                margin-bottom:10px;">

                                        <span th:text="${#numbers.formatDecimal(job.salary, 0, 'COMMA', 0, 'POINT')}"></span> đ
                                    </div>

                                    <!-- SKILLS -->
                                    <div style="margin-bottom:15px;">

                                        <span th:each="skill : ${job.skills}"
                                              th:text="${skill.name}"
                                              style="display:inline-block;
                                                     background-color:#f0f0f0;
                                                     border-radius:4px;
                                                     padding:5px 10px;
                                                     font-size:13px;
                                                     color:#333333;
                                                     margin-right:5px;
                                                     margin-bottom:5px;">
                                        </span>

                                    </div>

                                    <!-- DIVIDER -->
                                    <div style="border-top:1px dashed #dddddd;"></div>

                                </td>
                            </tr>

                        </table>

                    </td>
                </tr>

                <!-- BUTTON -->
                <tr>
                    <td align="center" style="padding-top:10px;">

                        <a href="http://localhost:4173/"
                           target="_blank"
                           style="display:block;
                                  background-color:#ea1e30;
                                  color:#ffffff;
                                  text-decoration:none;
                                  font-size:16px;
                                  font-weight:bold;
                                  line-height:48px;
                                  border-radius:6px;
                                  width:100%;
                                  max-width:300px;">
                            Xem thêm job tại website
                        </a>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="padding-top:35px;
                               font-size:15px;
                               color:#666666;
                               line-height:24px;">

                        Chúc bạn may mắn.
                        <br>
                        Admin.

                    </td>
                </tr>

            </table>

        </td>
    </tr>

</table>

</body>
</html>
```
